name: Build and Release FAPs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # allow manual run from Actions tab

permissions:
  contents: write  # needed to create releases and upload assets

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache ufbt SDK and toolchain
        uses: actions/cache@v4
        with:
          path: ~/.ufbt
          key: ufbt-unleashed-${{ runner.os }}-v1

      - name: Install ufbt
        run: pip install --upgrade ufbt

      - name: Fetch Unleashed SDK
        run: ufbt update --index-url=https://up.unleashedflip.com/directory.json

      - name: Build alarm_clock
        working-directory: alarm_clock
        run: ufbt

      - name: Build remote_hub
        working-directory: remote_hub
        run: ufbt

      - name: Build spectrum_sniffer
        working-directory: spectrum_sniffer
        run: ufbt

      - name: Build ir_killtv
        working-directory: ir_killtv
        run: ufbt

      - name: Build rdp_manager
        working-directory: rdp_manager
        run: ufbt

      - name: Build mouse_jiggler
        working-directory: mouse_jiggler
        run: ufbt

      - name: Build button_jiggler
        working-directory: button_jiggler
        run: ufbt

      - name: Build system_dashboard
        working-directory: system_dashboard
        run: ufbt

      - name: Build pomodoro_sync
        working-directory: pomodoro_sync
        run: ufbt

      - name: Build vibe_idle_keeper
        working-directory: vibe_idle_keeper
        run: ufbt

      - name: Build token_tracker
        working-directory: token_tracker
        run: ufbt

      - name: Build vpn_keeper
        working-directory: vpn_keeper
        run: ufbt

      - name: Build ble_vpn_button
        working-directory: ble_vpn_button
        run: ufbt

      - name: Build white_noise
        working-directory: white_noise
        run: ufbt

      - name: Build life_scenes
        working-directory: life_scenes
        run: ufbt

      - name: Build ibutton_fuzzer
        working-directory: ibutton_fuzzer
        run: ufbt

      - name: Collect FAPs
        run: |
          mkdir -p _release
          cp alarm_clock/dist/alarm_clock.fap             _release/
          cp remote_hub/dist/remote_hub.fap               _release/
          cp spectrum_sniffer/dist/spectrum_sniffer.fap   _release/
          cp ir_killtv/dist/ir_killtv.fap                 _release/
          cp rdp_manager/dist/rdp_manager.fap             _release/
          cp mouse_jiggler/dist/mouse_jiggler.fap         _release/
          cp button_jiggler/dist/button_jiggler.fap       _release/
          cp system_dashboard/dist/system_dashboard.fap   _release/
          cp pomodoro_sync/dist/pomodoro_sync.fap         _release/
          cp vibe_idle_keeper/dist/vibe_idle_keeper.fap   _release/
          cp token_tracker/dist/token_tracker.fap         _release/
          cp vpn_keeper/dist/vpn_keeper.fap               _release/
          cp ble_vpn_button/dist/ble_vpn_button.fap       _release/
          cp white_noise/dist/white_noise.fap             _release/
          cp life_scenes/dist/life_scenes.fap             _release/
          cp ibutton_fuzzer/dist/ibutton_fuzzer.fap       _release/
          ls -la _release/

      - name: Upload FAPs as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: flipperz-faps
          path: _release/*.fap

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "Flipperz $TAG" \
            --generate-notes \
            --notes "Прошивка: **Unleashed unlshd-089**

          ## Установка

          1. Скачай нужный \`.fap\` из ассетов ниже
          2. Через **qFlipper** скопируй на SD-карту Flipper'а в соответствующую папку:
             - \`alarm_clock.fap\` → \`apps/Tools/\`
             - \`remote_hub.fap\` → \`apps/Sub-GHz/\`
             - \`spectrum_sniffer.fap\` → \`apps/Sub-GHz/\`
             - \`ir_killtv.fap\` → \`apps/Infrared/\`
             - \`rdp_manager.fap\` → \`apps/USB/\`
             - \`mouse_jiggler.fap\` → \`apps/USB/\`
             - \`button_jiggler.fap\` → \`apps/USB/\`
             - \`system_dashboard.fap\` → \`apps/USB/\`
             - \`pomodoro_sync.fap\` → \`apps/USB/\`
             - \`vibe_idle_keeper.fap\` → \`apps/USB/\`
             - \`token_tracker.fap\` → \`apps/USB/\`
             - \`vpn_keeper.fap\` → \`apps/USB/\`
             - \`ble_vpn_button.fap\` → \`apps/Bluetooth/\`
             - \`white_noise.fap\` → \`apps/Media/\`
             - \`life_scenes.fap\` → \`apps/Tools/\` (+ положи .scene в \`/ext/life_scenes/\`)
             - \`ibutton_fuzzer.fap\` → \`apps/iButton/\` (только авторизованный пентест)
          3. Запусти на Flipper'е через \`Apps → <категория> → <имя>\`

          ## Совместимость

          Собрано под Unleashed \`unlshd-089\`. На других ветках (Momentum, Xtreme, RogueMaster, official) скорее всего тоже заработает, но не гарантировано — если есть проблемы, собери из исходников под свою прошивку." \
            _release/*.fap
